<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristal Brindes - Sistema de Gestão</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #323130;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        /* Design System CSS Variables */
        :root {
            /* Primary Colors (Fluent Blue Theme) */
            --color-primary-900: #004578;
            --color-primary-800: #005A9E;
            --color-primary-700: #0078D4;
            /* Fluent Accent */
            --color-primary-500: #2B88D8;

            /* Accent Color (Blue) */
            --color-accent-600: #0078D4;
            --color-accent-500: #2B88D8;
            --color-accent-50: #EFF6FC;

            /* Semantic Colors */
            --color-success-500: #107C10;
            --color-success-50: #F3F9F4;
            --color-warning-500: #D83B01;
            --color-warning-50: #FFF4CE;
            --color-danger-500: #A4262C;
            --color-danger-50: #FDF3F4;

            /* Neutrals (Fluent Grays) */
            --color-gray-50: #FAF9F8;
            --color-gray-100: #F3F2F1;
            --color-gray-200: #EDEBE9;
            --color-gray-500: #8A8886;
            --color-gray-700: #323130;
            --color-gray-900: #201F1E;

            /* Backgrounds */
            --bg-primary: #FFFFFF;
            --bg-secondary: #FFFFFF;
        }

        #global-error {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            color: #ef4444;
            padding: 2rem;
            z-index: 9999;
            overflow: auto;
            font-family: monospace;
        }

        /* ========================================
           GLOBAL CONTRAST ENHANCEMENT SYSTEM
           Inspired by well-defined light theme UIs
           ======================================== */

        /* INPUTS: Stronger borders, crisp appearance */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="url"],
        input[type="date"],
        input[type="search"],
        select,
        textarea,
        .form-input,
        .form-select,
        .form-textarea,
        [type="text"]:focus,
        [type="number"]:focus,
        [type="email"]:focus,
        [type="password"]:focus,
        select:focus,
        textarea:focus {
            border-color: #C8C6C4 !important;
            color: #323130 !important;
            background-color: #FFFFFF !important;
            border-radius: 6px;
            font-size: 14px;
        }

        [type="text"]:focus,
        [type="number"]:focus,
        [type="email"]:focus,
        [type="password"]:focus,
        select:focus,
        textarea:focus {
            border-color: #0078D4 !important;
            box-shadow: 0 0 0 1px #0078D4 !important;
            outline: none !important;
        }

        /* Placeholder text – visible but not dominant */
        ::placeholder {
            color: #A19F9D !important;
            opacity: 1;
        }

        /* LABELS: Slightly darker for readability */
        label {
            color: #605E5C;
            font-weight: 600;
        }

        /* TABLES: Defined header + row borders */
        table thead th {
            background-color: #FAF9F8 !important;
            color: #605E5C !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.04em;
            border-bottom: 2px solid #EDEBE9 !important;
        }

        table tbody td {
            border-bottom: 1px solid #EDEBE9 !important;
            color: #323130;
            font-size: 13px;
        }

        table tbody tr:hover {
            background-color: #F3F2F1 !important;
        }

        /* CARDS & PANELS: Defined borders, subtle shadow */
        .bg-white {
            border-color: #E1DFDD;
        }

        /* HEADINGS: Darker for hierarchy */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: #201F1E;
        }

        /* BADGES & PILLS: Ensure contrast */
        .rounded-full {
            font-weight: 600;
        }

        /* BUTTONS: Stronger presence */
        button {
            font-weight: 600;
        }

        /* Scrollbar refinement */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #C8C6C4;
            border-radius: 3px;
        }
    </style>
    <script>
        // Polyfill for process.env
        window.process = { env: { NODE_ENV: 'production' } };

        // Global Error Handler for White Screen of Death debugging
        window.addEventListener('error', function (event) {
            var errorBox = document.getElementById('global-error');
            if (errorBox) {
                errorBox.style.display = 'block';
                errorBox.innerHTML += '<h3>Erro Detectado:</h3><pre>' + event.message + '\n' + (event.filename || '') + ':' + (event.lineno || '') + '</pre><hr>';
            }
        });

        window.addEventListener('unhandledrejection', function (event) {
            var errorBox = document.getElementById('global-error');
            if (errorBox) {
                errorBox.style.display = 'block';
                errorBox.innerHTML += '<h3>Promessa Rejeitada:</h3><pre>' + (event.reason ? (event.reason.stack || event.reason) : 'Unknown reason') + '</pre><hr>';
            }
        });
    </script>
</head>

<body class="bg-white text-[#323130] min-h-screen">
    <div id="global-error">
        <h1 class="text-2xl font-bold mb-4 text-black">Ops! Algo deu errado ao carregar.</h1>
        <p class="text-gray-600 mb-4">Por favor, envie um print desta tela para o suporte.</p>
        <hr class="my-4 border-gray-300">
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
